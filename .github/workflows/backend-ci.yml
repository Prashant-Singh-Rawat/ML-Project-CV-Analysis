name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'backend/requirements*.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Check code formatting with Black
      run: black --check .

    - name: Lint with Ruff
      run: ruff check .

    - name: Run Tests with Pytest
      run: pytest tests/ -v

    - name: Verify Application Starts (Middleware + Import Check)
      run: |
        python -c "from utils.logger import logger; from utils.middleware import RequestIDMiddleware, TimingMiddleware; print('✅ Logger and Middleware imports OK')"
        python -c "from main import app; print('✅ App loaded successfully — routes:', len(app.routes))"
