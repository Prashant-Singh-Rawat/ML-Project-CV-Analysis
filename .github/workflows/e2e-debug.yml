name: E2E Testing & Auto-Debugging Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight to catch live regressions

jobs:
  backend-api-tests:
    name: Backend API Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          pip install fpdf2 # Required for test PDF generation

      - name: Run Backend Tests
        run: |
          cd backend
          pytest tests/test_analyze_flow.py -v

  frontend-e2e-tests:
    name: Playwright E2E UI Tests
    runs-on: ubuntu-latest
    # Wait for backend API tests to pass first
    needs: backend-api-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        working-directory: frontend
        env:
          # Point tests to the local dev server we will spawn
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173
          VITE_API_URL: https://tonycv-backend.onrender.com
        run: npx playwright test

      - name: Upload Test Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Test Traces on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-and-videos
          path: frontend/test-results/
          retention-days: 7

      - name: Auto-Debug Ping Live Backend on Failure
        if: failure()
        run: |
          echo "Playwright E2E tests failed. Pinging backend for health check..."
          curl -v https://tonycv-backend.onrender.com/health
