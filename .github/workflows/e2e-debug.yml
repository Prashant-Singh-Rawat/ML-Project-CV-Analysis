name: E2E Testing & Auto-Debugging Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 0 * * *"

jobs:
  backend-api-tests:
    name: Backend API Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest pytest-asyncio python-multipart pydantic pydantic-settings python-jose[cryptography] passlib[bcrypt]

      - name: Run Backend Health Test
        run: |
          cd backend
          pytest tests/test_health.py -v

  frontend-e2e-tests:
    name: Playwright E2E UI Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        working-directory: ./frontend
        run: npx playwright test --reporter=list
        env:
          CI: true
